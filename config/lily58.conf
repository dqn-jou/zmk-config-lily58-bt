# config/lily58.conf

# ============================================
# BLE Compatibility Fixes for Windows 11
# ============================================
# Enable all experimental BLE features (includes passkey entry support)
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Explicitly enable passkey entry for PIN code pairing
# This is required for Windows 11 that demands 6-digit PIN during pairing
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Additional experimental features for better stability
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# Disable 2M PHY - helps with connection stability on Windows
CONFIG_BT_CTLR_PHY_2M=n

# Work around Windows GATT subscription bug
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# ============================================
# Bluetooth Power Settings
# ============================================
# Increase Bluetooth power for better connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ============================================
# Display Settings
# ============================================
# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Show layer name on display (will show WIN/MAC/etc)
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# Show battery percentage
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Show WPM counter (optional - comment out if you don't want it)
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Show output status (USB vs BLE)
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# ============================================
# Power Management
# ============================================
# Turn off display after 30 seconds of inactivity (saves battery)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep after 15 minutes (saves battery)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ============================================
# Hold-Tap Settings (Fixes key sticking)
# ============================================
# Quick tap: if you tap and release within this time, it's a tap
CONFIG_ZMK_HOLD_TAP_QUICK_TAP_MS=200

# Tapping term: how long to wait to decide between tap and hold
CONFIG_ZMK_HOLD_TAP_TAPPING_TERM_MS=280

# Don't trigger hold if another key is pressed while this is held
CONFIG_ZMK_HOLD_TAP_HOLD_ON_TOP_PRESSED=n

# Permissive hold: trigger hold immediately if another key is pressed
CONFIG_ZMK_HOLD_TAP_PERMISSIVE_HOLD=n

# Retro tapping: tap behavior is triggered if key is released within tapping term
CONFIG_ZMK_HOLD_TAP_RETRO_TAPPING=n

# ============================================
# Optional Settings (commented out)
# ============================================
# Flip display if it's upside down (uncomment if needed)
# CONFIG_LVGL_DISPLAY_ORIENTATION_180=y

# For debugging (optional)
# CONFIG_ZMK_USB_LOGGING=y
